<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll The Dice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form">
        <h1 class="text-form">Player 1 </h1>
        <div class="player">
            <input type="text" class ="name" id="name-player1" enterkeyhint="done" data-idx="0" placeholder="input player1 name">
            <select class="color-dropdown" id="color-player1" data-idx="0">
                <option value="" disabled selected>color</option>
                <option value="red">🔴</option>
                <option value="blue">🔵</option>
                <option value="yellow">🟡</option>
                <option value="green">🟢</option>
            </select>
        </div>
        
        <h1 class="text-form">Player 2</h1>
        <div class="player">
            <input type="text" class ="name" id="name-player2" data-idx="1" enterkeyhint="done" placeholder="input player2 name">
            <select class="color-dropdown" data-idx="1" id="color-player2">
                <option value="" disabled selected>color</option>
                <option value="red">🔴</option>
                <option value="blue">🔵</option>
                <option value="yellow">🟡</option>
                <option value="green">🟢</option>
            </select>
        </div>
        
        <h1 class="text-form">Player 3</h1>
        <div class="player">
            <input type="text" class ="name" id="name-player3" data-idx="2" enterkeyhint="done"  placeholder="input player3 name">
            <select class="color-dropdown" id="color-player3" data-idx="2">
                <option value="" disabled selected>color</option>
                <option value="red">🔴</option>
                <option value="blue">🔵</option>
                <option value="yellow">🟡</option>
                <option value="green">🟢</option>
            </select>
        </div>
        
        <h1 class="text-form">Player 4</h1>
        <div class="player">
            <input type="text" class ="name" enterkeyhint="done" id="name-player4" data-idx="3" placeholder="input player4 name">
            <select class="color-dropdown" id="color-player4" data-idx="3">
                <option value="" disabled selected>color</option>
                <option value="red">🔴</option>
                <option value="blue">🔵</option>
                <option value="yellow">🟡</option>
                <option value="green">🟢</option>
            </select>
        </div>
        <button class="start-btn">start</button>
    </div>

    <div class="container">
        <div class="left-container">
            <div class="dice d1">1</div>
            <div class="dice d2">2</div>
            <div class="dice d3">3</div>
            <div class="dice d4">4</div>
            <div class="dice d5">5</div>
            <div class="dice d6">6</div>
            <div class="dice d7">7</div>
            <div class="dice d8">+1</div>
        </div>

        <div class="right-container">
            <div class="supply-container">    
                <div class="food">
                    <img src="picture/food.png" alt="food">
                    <p class="food-text">0</p>
                    <p class="sup"></p>
                </div>
                <div class="wood">
                    <img src="picture/wood.png" alt="wood.png">
                    <p class="wood-text">0</p>
                    <p class="sup"></p>
                </div>
                <div class="clay">
                    <img src="picture/clay.png" alt="clay.png">
                    <p class="clay-text">0</p>
                    <p class="sup"></p>
                </div>
                <div class="stone">
                    <img src="picture/stone.png" alt="stone.png">
                    <p class="stone-text">0</p>
                    <p class="sup"></p>
                </div>
                <div class="gold">
                    <img src="picture/gold.png" alt="gold.png">
                    <p class="gold-text">0<sup></sup></p>
                </div>
            </div>

            <div class="score-container">
                <div class="player1 player">
                    <p class="text">Player 1</p>
                    <p class="score1">0</p>
                    <input type="text" class="score-player1" enterkeyhint="done" placeholder="score" >
                </div>
                
                <div class="player2 player">
                    <p class="text">Player 2</p>
                    <p class="score2">0</p>
                    <input type="text" class="score-player2" enterkeyhint="done" placeholder="score">
                </div>

                <div class="player3 player">
                    <p class="text">Player 2</p>
                    <p class="score3">0</p>
                    <input type="text" class="score-player3" enterkeyhint="done" placeholder="score">
                </div>

                <div class="player4 player">
                    <p class="text">Player 2</p>
                    <p class="score4">0</p>
                    <input type="text" class="score-player4" enterkeyhint="done" placeholder="score">
                </div>

            </div>
            <div class="dice-point-container">
                <div class="dice-point-total">W</div>
                <div class="dice-point">E</div>
                <div class="dice-point">L</div>
                <div class="dice-point">L</div>
                <div class="dice-point">C</div>
                <div class="dice-point">O</div>
                <div class="dice-point">M</div>
                <div class="dice-point">E</div>
            </div>
        </div>
    </div>

    <div class="time-container">
        <p>Time : <span class="timer-display">00:00</span></p>
    </div>

    <div class="noti-container">
    </div>

    <div id="rotate-notice">
        <div class="message">
            <h1>🔄</h1>
            <p>Please rotate your device to Landscape mode</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
