<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll The Dice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        /* CSS from style.css */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-image: url(https://www.yucata.de/netimages/games/StoneAge/spielplan.jpg);
            background-size: cover;
            color: white;
            font-family: 'Roboto', sans-serif;
        }

        .container {
            display: flex;
            width: 100%;
            height: 90vh;
            gap: 5px;
        }

        .left-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            flex: 1;
            height: 100%;
            margin: 10px;
            backdrop-filter: blur(2px);
            background: #0000004e;
        }

        .left-container .dice {
            aspect-ratio: 1/1;
            width: 100%;
            border: 2px solid #fffbfb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            background: none;
            cursor: pointer;
        }

        .left-container .dice:hover {
            background: rgb(255, 166, 0);
        }

        .left-container .d8 {
            background: #323cf8;
        }
        .left-container .d8:hover {
            background: #569cff;
        }

        .right-container {
            margin: 10px 10px 0 0px;
            display: flex;
            height: 100%;
            flex: 9;
            flex-direction: column;
            gap: 5px;
        }

        .supply-container {
            backdrop-filter: blur(2px);
            background: #0000004e;
            flex: 5;
            display: flex;
            justify-content: space-around;
            border: 2px solid #ffffff;
        }

        .supply-container div {
            flex: 1;
            text-align: center;
        }
        .supply-container div img {
            aspect-ratio: 1/1;
            width: 90%;
            object-fit: contain;
        }

        .supply-container div p {
            font-size: 2.5vw;
            text-align: center;
            padding-bottom: 10%;
        }

        .dice-point-container {
            flex: 3;
            display: flex;
            backdrop-filter: blur(2px);
            background: #0000004e;
        }

        .dice-point-container div {
            border: 2px solid #000000;
            flex: 1;
            display: flex;
            font-size: 3vw;
            justify-content: center;
            align-items: center;
            background: white;
            color: black;
            min-height: 50px;
        }

        .dice-point-container .dice-point-total {
            color: white;
            background: rgb(31, 118, 0);
        }

        .score-container {
            flex: 4;
            border: 1px solid #ffffff;
            display: flex;
            backdrop-filter: blur(2px);
            background: #0000004e;
        }

        .score-container div {
            border: 1px solid #ffffff;
            flex: 1;
            flex-direction: column;
            font-size: 2vw;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: start;
        }

        .score-container div .text {
            margin: 20px 0 10px 0;
        }

        .score-container div input {
            border: 1px solid #ffffff;
            margin: 5px 0;
            height: 30px;
            width: 60%;
            text-align: center;
            font-size: 1vw;
            color: rgb(0, 0, 0);
        }

        .score-container div button {
            width: 40%;
            height: 30px;
            background: white;
            border: none;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-container">
            <div class="dice d1">1</div>
            <div class="dice d2">2</div>
            <div class="dice d3">3</div>
            <div class="dice d4">4</div>
            <div class="dice d5">5</div>
            <div class="dice d6">6</div>
            <div class="dice d7">7</div>
            <div class="dice d8">+1</div>
        </div>

        <div class="right-container">
            <div class="supply-container">    
                <div class="food">
                    <img src="picture/food.png" alt="food">
                    <p class="food-text">0</p>
                </div>
                <div class="wood">
                    <img src="picture/wood.png" alt="wood">
                    <p class="wood-text">0</p>
                </div>
                <div class="clay">
                    <img src="picture/clay.png" alt="clay">
                    <p class="clay-text">0</p>
                </div>
                <div class="stone">
                    <img src="picture/stone.png" alt="stone">
                    <p class="stone-text">0</p>
                </div>
                <div class="gold">
                    <img src="picture/gold.png" alt="gold">
                    <p class="gold-text">0</p>
                </div>
            </div>

            <div class="score-container">
                <div class="player1">
                    <p class="text">Player 1</p>
                    <p class="score1">0</p>
                    <input type="text" class="score-player1" placeholder="score" >
                    <button class="btn-1">บันทึก</button>
                </div>
                
                <div class="player2">
                    <p class="text">Player 2</p>
                    <p class="score2">0</p>
                    <input type="text" class="score-player2" placeholder="score">
                    <button class="btn-2">บันทึก</button>
                </div>
            </div>

            <div class="dice-point-container">
                <div class="dice-point-total"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
                <div class="dice-point"></div>
            </div>
        </div>
    </div>

    <script>
        // JS from script.js
        const dices = document.querySelectorAll('.dice')
        const food = document.querySelector('.food-text')
        const wood = document.querySelector('.wood-text')
        const clay = document.querySelector('.clay-text')
        const stone = document.querySelector('.stone-text')
        const gold = document.querySelector('.gold-text')
        const dicePoints = document.querySelectorAll('.dice-point')
        const inputScorePlayer1 = document.querySelector('.score-player1')
        const inputScorePlayer2 = document.querySelector('.score-player2')
        const score1 = document.querySelector('.score1')
        const score2 = document.querySelector('.score2')
        const total = document.querySelector('.dice-point-total')
        const btn1 = document.querySelector('.btn-1')
        const btn2 = document.querySelector('.btn-2')

        let totalPoints = 0
        let scorePlayer1 = 0
        let scorePlayer2 = 0

        dices.forEach(e => e.addEventListener('click', () => {
            const index = e.innerText
            if (index === '+1') {
                rollDice('+1')
                return
            }
            const a = rollDice(Number(index))
            console.log(`total : ${a}`)
        }))

        inputScorePlayer1.addEventListener('keydown', addScore)
        inputScorePlayer2.addEventListener('keydown', addScore)

        btn1.addEventListener('click', () => {
            addScore({ target: inputScorePlayer1, key: 'Click' })
        })
        btn2.addEventListener('click', () => {
            addScore({ target: inputScorePlayer2, key: 'Click' })
        })

        function addScore(el) {
            const targetInput = el.target;
            
            // Allow submission via 'Enter' key or button click
            if (el.key !== 'Enter' && el.key !== 'Click') return;

            if (isNaN(targetInput.value) || targetInput.value === '') return;

            if (targetInput.classList.contains('score-player1')) {
                scorePlayer1 += Number(targetInput.value);
            } 
            else if (targetInput.classList.contains('score-player2')) {
                scorePlayer2 += Number(targetInput.value);
            }

            targetInput.value = '';
            score1.innerText = scorePlayer1;
            score2.innerText = scorePlayer2;
        }

        function rollDice(n) {
            if (n === '+1') {
                totalPoints += 1
            }
            else {    
                totalPoints = 0
                dicePoints.forEach(e => e.innerText = '')
                for (let i = 0; i < n; i++) {
                    const randomNumber = Math.floor(Math.random() * 6) + 1;
                    totalPoints += randomNumber
                    if(dicePoints[i]) dicePoints[i].innerText = randomNumber;
                }
            }

            const calculate = (points) => {
                food.innerText = Math.floor(points / 2)
                wood.innerText = Math.floor(points / 3)
                clay.innerText = Math.floor(points / 4)
                stone.innerText = Math.floor(points / 5)
                gold.innerText = Math.floor(points / 6)
            }
            
            calculate(totalPoints);
            total.innerText = totalPoints;
            return totalPoints;
        }
    </script>
</body>
</html>
